<script>
    // CONFIGURAÇÕES
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7Dme1eQbDXe--GvMP_mTKRcc_8qRg4BPL_m7sekJxzgEAp5EmqqSthEfMsijNgD7p/exec";
    const ADMIN_PWD = "1234$#@";
    const HOURS = ["09:30", "11:00", "14:30", "16:00"];

    // ESTADO GLOBAL
    let bookings = [];
    let pendingBookings = []; // bloqueios locais imediatos
    let selectedDate = null;
    let selectedTime = null;
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let activeBooking = null;

    function startup() {
        let now = new Date();
        let start = new Date();
        if (now.getHours() >= 18) start.setDate(start.getDate() + 1);
        while (start.getDay() === 0 || start.getDay() === 6) start.setDate(start.getDate() + 1);

        selectedDate = toIso(start);
        renderCalendar();
        syncData();
    }

    function startApp() {
        const lp = document.getElementById('landing-page');
        const app = document.getElementById('main-app');
        lp.style.opacity = '0';
        lp.style.transform = 'scale(1.1)';
        setTimeout(() => {
            lp.classList.add('hidden');
            app.classList.remove('hidden');
            setTimeout(() => app.classList.add('opacity-100'), 50);
        }, 500);
    }

    function moveMonth(dir) {
        currentMonth += dir;
        if (currentMonth < 0) {
            currentMonth = 11;
            currentYear--;
        } else if (currentMonth > 11) {
            currentMonth = 0;
            currentYear++;
        }
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        const title = document.getElementById('calendar-title');
        grid.innerHTML = '';

        const monthNames = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        title.innerText = `${monthNames[currentMonth]} ${currentYear}`;

        const startDay = new Date(currentYear, currentMonth, 1).getDay();
        const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();
        const now = new Date();
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        for (let i = 0; i < startDay; i++) {
            grid.appendChild(document.createElement('div'));
        }

        for (let d = 1; d <= totalDays; d++) {
            const dayObj = new Date(currentYear, currentMonth, d);
            dayObj.setHours(0, 0, 0, 0);

            const iso = toIso(dayObj);
            const isPast = dayObj < today;
            const isWeekend = dayObj.getDay() === 0 || dayObj.getDay() === 6;
            const isLateToday = iso === toIso(now) && now.getHours() >= 18;
            const disabled = isPast || isWeekend || isLateToday;

            const cell = document.createElement('div');
            cell.className = `calendar-day ${disabled ? 'disabled' : ''} ${iso === selectedDate ? 'selected' : 'hover:bg-blue-50 text-gray-700'}`;
            cell.innerText = d;

            if (!disabled) {
                cell.onclick = () => {
                    selectedDate = iso;
                    renderCalendar();
                    renderSlots(true);
                };
            }

            grid.appendChild(cell);
        }

        renderSlots(false);
    }

    function normalizeDate(value) {
        if (!value) return '';

        let v = String(value).trim();

        // formato ISO com horário: 2026-03-17T00:00:00.000Z
        if (v.includes('T')) {
            return v.split('T')[0];
        }

        // formato BR: 17/03/2026
        if (/^\d{2}\/\d{2}\/\d{4}$/.test(v)) {
            const [dd, mm, yyyy] = v.split('/');
            return `${yyyy}-${mm}-${dd}`;
        }

        // formato ISO simples: 2026-03-17
        if (/^\d{4}-\d{2}-\d{2}$/.test(v)) {
            return v;
        }

        // tentativa final via Date
        const parsed = new Date(v);
        if (!isNaN(parsed.getTime())) {
            return toIso(parsed);
        }

        return v;
    }

    function normalizeTime(value) {
        if (!value) return '';
        return String(value).trim().slice(0, 5);
    }

    function isSlotBooked(date, time) {
        const normalizedDate = normalizeDate(date);
        const normalizedTime = normalizeTime(time);

        const allBookings = [...bookings, ...pendingBookings];

        return allBookings.some(b => {
            return normalizeDate(b.date) === normalizedDate &&
                   normalizeTime(b.time) === normalizedTime;
        });
    }

    function renderSlots(animate) {
        const grid = document.getElementById('time-grid');
        grid.innerHTML = '';

        HOURS.forEach((h, i) => {
            const match =
                [...bookings, ...pendingBookings].find(b =>
                    normalizeDate(b.date) === selectedDate &&
                    normalizeTime(b.time) === h
                );

            const btn = document.createElement('button');
            btn.className = `w-full py-5 rounded-[1.8rem] font-bold flex flex-col items-center justify-center gap-1 border-2 transition-all btn-interact ${animate ? 'animate-slot' : ''}`;
            btn.style.animationDelay = `${i * 0.05}s`;

            if (match) {
                btn.classList.add('bg-red-50', 'text-red-500', 'border-red-100');
                btn.innerHTML = `<i class="fas fa-lock text-xs opacity-40"></i><span>${h}</span><span class="text-[0.55rem] uppercase opacity-60 tracking-widest font-extrabold">Reservado</span>`;
                btn.onclick = () => {
                    activeBooking = match;
                    openModal('modal-password');
                };
            } else {
                btn.classList.add('bg-white', 'text-[#2b7de0]', 'border-blue-50', 'hover:border-blue-200', 'hover:bg-blue-50/20', 'shadow-sm');
                btn.innerHTML = `<i class="far fa-clock text-xs text-[#f57c24]"></i><span>${h}</span><span class="text-[0.55rem] uppercase tracking-widest text-[#f57c24] font-extrabold">Livre</span>`;
                btn.onclick = () => {
                    if (isSlotBooked(selectedDate, h)) {
                        showFeedback("Horário indisponível", "Esse horário acabou de ser reservado. Escolha outro.", "bg-red-50 text-red-600", "fa-lock");
                        renderSlots(true);
                        return;
                    }

                    selectedTime = h;
                    openBooking();
                };
            }

            grid.appendChild(btn);
        });
    }

    async function syncData() {
        const icon = document.getElementById('sync-icon');
        if (icon) icon.classList.add('sync-spin');

        try {
            const res = await fetch(`${SCRIPT_URL}?action=get&t=${Date.now()}`, {
                method: 'GET',
                cache: 'no-store'
            });

            const data = await res.json();

            if (Array.isArray(data)) {
                bookings = data.map(item => ({
                    ...item,
                    date: normalizeDate(item.date),
                    time: normalizeTime(item.time)
                }));

                // remove pendências que já chegaram da planilha
                pendingBookings = pendingBookings.filter(p =>
                    !bookings.some(b =>
                        normalizeDate(b.date) === normalizeDate(p.date) &&
                        normalizeTime(b.time) === normalizeTime(p.time)
                    )
                );

                renderSlots(true);
            }
        } catch (e) {
            console.error("Sync Error:", e);
        } finally {
            if (icon) {
                setTimeout(() => icon.classList.remove('sync-spin'), 600);
            }
        }
    }

    function openBooking() {
        document.getElementById('info-data').innerText =
            `${selectedDate.split('-').reverse().join('/')} às ${selectedTime}`;
        openModal('modal-booking');
    }

    document.getElementById('form-booking').onsubmit = async (e) => {
        e.preventDefault();

        if (isSlotBooked(selectedDate, selectedTime)) {
            closeModals();
            showFeedback("Horário indisponível", "Esse horário já foi reservado. Escolha outro.", "bg-red-50 text-red-600", "fa-lock");
            renderSlots(true);
            return;
        }

        const btn = document.getElementById('btn-finalizar');
        const originalHTML = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch sync-spin mr-2"></i> Agendando...';

        const novaReserva = {
            date: selectedDate,
            time: selectedTime,
            empresa: document.getElementById('agencia').value.trim(),
            nome: document.getElementById('responsavel').value.trim(),
            email: document.getElementById('email').value.trim(),
            assunto: document.getElementById('assunto').value.trim()
        };

        // BLOQUEIA IMEDIATAMENTE NO FRONT
        pendingBookings.push(novaReserva);
        renderSlots(true);

        const p = new URLSearchParams();
        p.append('date', novaReserva.date);
        p.append('time', novaReserva.time);
        p.append('empresa', novaReserva.empresa);
        p.append('nome', novaReserva.nome);
        p.append('email', novaReserva.email);
        p.append('assunto', novaReserva.assunto);

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: p,
                mode: 'no-cors'
            });

            closeModals();
            document.getElementById('form-booking').reset();

            showFeedback(
                "Sucesso!",
                "Sua visita foi agendada. O horário já foi bloqueado.",
                "bg-green-50 text-green-600",
                "fa-check-circle"
            );

            // sincroniza algumas vezes para confirmar persistência
            setTimeout(syncData, 1500);
            setTimeout(syncData, 4000);
            setTimeout(syncData, 7000);

        } catch (err) {
            // remove bloqueio local se der erro real de rede
            pendingBookings = pendingBookings.filter(b =>
                !(normalizeDate(b.date) === normalizeDate(novaReserva.date) &&
                  normalizeTime(b.time) === normalizeTime(novaReserva.time))
            );

            renderSlots(true);

            showFeedback(
                "Erro",
                "Falha na conexão. Tente novamente.",
                "bg-red-50 text-red-600",
                "fa-exclamation-triangle"
            );
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalHTML;
        }
    };

    function checkAdmin() {
        const passInput = document.getElementById('admin-pass');

        if (passInput.value === ADMIN_PWD) {
            const b = activeBooking;
            if (!b) return;

            closeModals();
            document.getElementById('details-content').innerHTML = `
                <div class="bg-gray-50 p-5 rounded-3xl animate-slot">
                    <label class="text-[0.65rem] font-bold text-gray-400 uppercase block mb-1">Agência</label>
                    <p class="font-bold text-xl text-gray-800">${escapeHtml(b.empresa || 'N/A')}</p>
                </div>
                <div class="bg-gray-50 p-5 rounded-3xl animate-slot" style="animation-delay:0.1s">
                    <label class="text-[0.65rem] font-bold text-gray-400 uppercase block mb-1">Contato</label>
                    <p class="font-bold text-gray-800 text-lg">${escapeHtml(b.nome || 'N/A')}</p>
                </div>
                <div class="bg-gray-50 p-5 rounded-3xl animate-slot" style="animation-delay:0.2s">
                    <label class="text-[0.65rem] font-bold text-gray-400 uppercase block mb-1">E-mail</label>
                    <p class="text-blue-600 font-bold break-all underline">${escapeHtml(b.email || 'N/A')}</p>
                </div>
                <div class="bg-gray-50 p-5 rounded-3xl animate-slot" style="animation-delay:0.3s">
                    <label class="text-[0.65rem] font-bold text-gray-400 uppercase block mb-1">Assunto</label>
                    <p class="text-gray-700 font-medium">${escapeHtml(b.assunto || 'N/A')}</p>
                </div>
            `;
            openModal('modal-details');
        } else {
            showFeedback("Acesso Negado", "Senha incorreta.", "bg-red-50 text-red-500", "fa-lock");
        }

        passInput.value = '';
    }

    function openModal(id) {
        const m = document.getElementById(id);
        m.classList.remove('hidden');
        m.classList.add('flex');
        document.body.style.overflow = 'hidden';
        setTimeout(() => m.style.opacity = '1', 10);
    }

    function closeModals() {
        document.querySelectorAll('[id^="modal-"]').forEach(m => {
            m.style.opacity = '0';
            setTimeout(() => {
                m.classList.add('hidden');
                m.classList.remove('flex');
            }, 300);
        });

        document.body.style.overflow = 'auto';
        activeBooking = null;
    }

    function showFeedback(t, s, c, i) {
        document.getElementById('msg-title').innerText = t;
        document.getElementById('msg-text').innerText = s;
        const box = document.getElementById('msg-icon');
        box.className = `w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 ${c}`;
        box.innerHTML = `<i class="fas ${i} text-4xl"></i>`;
        openModal('modal-msg');
    }

    function toIso(d) {
        const local = new Date(d);
        return `${local.getFullYear()}-${String(local.getMonth() + 1).padStart(2, '0')}-${String(local.getDate()).padStart(2, '0')}`;
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    window.onload = startup;
</script>
